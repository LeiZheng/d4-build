# Maps SkillKit gbid codenames → d4data Power file.
#
# Per-Upgrade modifier names are auto-extracted at runtime from the Power
# file's arMods list (sorted by dwModId ascending → Upgrade2/3/4/A/B/C).
# Upgrade1 is always treated as "Enhanced <skill>" (flat buff, no Mod entry).
#
# Add a new entry per class+skill: just `display_name` + `power_file`. The
# tool reads `Power_<power_file>.pow.json` for arMods and matches against
# `Power_<power_file>.stl.json` for Mod{N}_Name display strings.
#
# Use the optional `upgrades:` block to override the auto-extracted name
# for a specific suffix when the canonical order doesn't match Maxroll's UI.

# Warlock — Lord of Hatred (2026-04-28+)

Warlock_Core_AbyssDemon:
  display_name: "Dread Claws"
  power_file: Power_Warlock_ShadowShred

Warlock_Basic_Demon2:
