# Maps SkillKit gbid codenames → d4data Power file → per-Upgrade Mod names.
#
# d4data uses three different naming systems for the same skill:
#   1. Maxroll user-facing name      ("Dread Claws", "Sigil of Subversion")
#   2. SkillKit codename              (Warlock_Core_AbyssDemon, Warlock_Sigil_Abyss)
#   3. Power file codename            (ShadowShred, SigilOfShadows)
#
# This file maps (2) → (3) → individual Mod display names per Upgrade suffix.
#
# Format:
#   <skillkit_codename>:
#     display_name: "<user-facing name>"
#     power_file: "<Power_<codename>>"
#     upgrades:
#       Upgrade1: "Enhanced <skill>"   # flat numerical buff, no Mod entry
#       Upgrade2: "<Mod name>"
#       Upgrade3: "<Mod name>"
#       Upgrade4: "<Mod name>"
#       UpgradeA: "<Mod name>"
#       UpgradeB: "<Mod name>"
#       UpgradeC: "<Mod name>"
#
# When this file is missing an entry, the report falls back to the codename
# humanizer ("Upgrade 1" / "Upgrade 2" / etc.).

# Warlock skills present in the Dread Claws + adjacent leveling builds
# (Lord of Hatred, 2026-04-28+).

Warlock_Core_AbyssDemon:
  display_name: "Dread Claws"
  power_file: Power_Warlock_ShadowShred
  upgrades:
    Upgrade1: "Enhanced Dread Claws"
    Upgrade2: "Cascading Dread"      # Mod6
    Upgrade3: "Enveloping Terror"    # Mod7
    Upgrade4: "Ravenous Jaws"        # Mod8
    UpgradeA: "Damage"               # Mod12
    UpgradeB: "Cost Reduction"       # Mod13
    UpgradeC: "Ambush"               # Mod14

