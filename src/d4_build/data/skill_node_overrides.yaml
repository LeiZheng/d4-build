# Manual skill-tree node-ID -> name overrides.
#
# This is a STOPGAP for cases d4data doesn't cover. The primary resolver is
# `D4DataLookup.skill_node_label_for(class, node_id)`, which reads
# `base/meta/SkillKit/<Class>.skl.json` and returns a humanized power name
# from `arNodes[i].gbidReward.name`. When that returns a non-empty string,
# the YAML below is *not* consulted.
#
# Use this file ONLY for nodes d4data fails to resolve (e.g., a brand-new
# class added in a patch d4data hasn't shipped yet, or rare nodes whose
# gbid name doesn't exist in the SkillKit). Keep this file empty when
# everything resolves through d4data.
#
# Format:
#   <class_slug>:
#     "<node_id>": "<display name>"

# (currently empty — Warlock node IDs resolve via d4data SkillKit since
# Lord of Hatred shipped on 2026-04-28)
