# Manual skill-tree node-ID -> name overrides.
#
# Used as a STOPGAP until d4data ships an update that includes the relevant
# class skill tree definitions. When d4data has the data, this file should be
# deleted and the lookup chain in `reconcile.py` will fall through automatically.
#
# Naming convention:
# - Names mirror Maxroll's planner UI labels.
# - "(Basic)" / "(Core)" / "(Defensive)" / "(Mastery)" / "(Ultimate)" / "(Key Passive)"
#   suffixes mark cluster type when the role is identifiable.
# - "(?)" suffix marks a low-confidence inference — verify against the planner URL
#   in the report's data-freshness footer before acting on it.
#
# Confidence is graded by how many independent build variants reference the
# same node id in the same role. Universal nodes (used by every variant of
# the class) are HIGH confidence; per-archetype nodes are inferred from step
# naming.

